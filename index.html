<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>DEVCONF</title>
  </head>
  <body>
    <!-- Header Start -->
    <header>
      <nav class="navbar">
        <!-- Logo -->
        <div class="logo">
          <img src="./assets/logo.png" alt="Logo" />
        </div>

        <!-- Menu Start-->
        <ul class="nav-links">
          <li><a href="">Speakers</a></li>
          <li><a href="">Schedule</a></li>
          <li><a href="">Tracks</a></li>
          <li><a href="">Venue</a></li>
          <li><a href="">Blog</a></li>
        </ul>

        <!-- Button -->
        <div class="nav-btn">
          <a href="" class="register-btn">Register Now</a>
        </div>
      </nav>
    </header>
    <!-- Header End -->

    <!-- Banner Section Start -->
    <section class="banner">
      <!-- Background Image -->
      <img src="./assets/banner.jpg" alt="Banner Image" class="banner-img" />

      <!-- Banner Content -->
      <div class="banner-content">
        <h1>Code. <em>Connect.</em> Create</h1>

        <p>
          Join 4,000+ engineers, founders, and builders at the premier developer
          conference of 2026. Three days of cutting-edge talks, hands-on
          workshops, and meaningful connections.
        </p>
      </div>

      <!-- Register Button -->
      <div class="banner-btn">
        <a href="">Register Now</a>
      </div>
    </section>
  </body>
</html>
